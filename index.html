<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeTemps</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#f5f5f5;}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    background:#1a1a2e;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.logo{color:gold;font-weight:bold;}

.nav-links{
    display:flex;
    gap:20px;
    list-style:none;
}

.nav-links a{
    color:white;
    text-decoration:none;
}

/* HERO */
.hero{
    margin-top:80px;
    height:60vh;
    background:#16213e;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.product-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.product-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-info{
    padding:15px;
}

button{
    width:100%;
    padding:10px;
    background:#1a1a2e;
    color:white;
    border:none;
    margin-top:10px;
}

/* CART */
.cart-icon{
    cursor:pointer;
}

.cart-count{
    background:red;
    color:white;
    border-radius:50%;
    padding:2px 7px;
}

/* MODAL CART */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:350px;
}

/* FORM POPUP */
.overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.form-box{
    background:white;
    padding:20px;
    width:300px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">LuxeTemps</div>

<ul class="nav-links">
<li><a href="#products">Produits</a></li>
<li><a href="#" onclick="openForm()">Inscription</a></li>
</ul>

<div class="cart-icon" onclick="openCart()">
🛒 <span class="cart-count" id="cartCount">0</span>
</div>
</header>

<!-- HERO -->
<section class="hero">
<h1>Montres LuxeTemps</h1>
<p>La perfection au poignet</p>
</section>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-content">
<h3>Panier</h3>
<div id="cartItems"></div>
<h3>Total: <span id="total">0</span> DZD</h3>
<button onclick="closeCart()">Fermer</button>
</div>
</div>

<!-- FORM -->
<div class="overlay" id="overlay">
<div class="form-box">
<h3>Inscription</h3>

<input type="text" placeholder="Nom">
<input type="email" placeholder="Email">
<input type="password" placeholder="Mot de passe">

<button onclick="alert('Compte créé ✅')">S'inscrire</button>
<button onclick="closeForm()">Fermer</button>
</div>
</div>

<script>
const products=[
{ id:1,name:"Curren Bleu",price:12990,category:"men",type:"luxury",image:"images/montre1.jpg"},
{ id:2,name:"Curren Noir",price:18990,category:"men",type:"luxury",image:"images/montre2.jpg"},
{ id:3,name:"Curren Gris",price:15990,category:"men",type:"luxury",image:"images/montre3.jpg"},
{ id:4,name:"Curren Vert",price:17490,category:"men",type:"luxury",image:"images/montre4.jpg"},
{ id:5,name:"Rolex Rose",price:8990,category:"women",type:"luxury",image:"images/montre5.jpg"},
{ id:6,name:"Smart Watch",price:14290,category:"women",type:"sport",image:"images/montre6.jpg"}
];

let cart=[];

/* PRODUCTS */
function renderProducts(){
document.getElementById("products").innerHTML =
products.map(p=>`
<div class="product-card">
<img src="${p.image}">
<div class="product-info">
<h3>${p.name}</h3>
<p>${p.price.toLocaleString()} DZD</p>
<button onclick="addToCart(${p.id})">Ajouter</button>
</div>
</div>
`).join("");
}

/* CART */
function addToCart(id){
let p=products.find(x=>x.id===id);
let item=cart.find(i=>i.id===id);

if(item) item.quantity++;
else cart.push({...p,quantity:1});

updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText =
cart.reduce((a,b)=>a+b.quantity,0);

let total=0;

document.getElementById("cartItems").innerHTML =
cart.map(i=>{
total+=i.price*i.quantity;
return `<p>${i.name} x${i.quantity}</p>`;
}).join("");

document.getElementById("total").innerText=total.toLocaleString();
}

/* CART MODAL */
function openCart(){
document.getElementById("cartModal").style.display="flex";
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

/* FORM */
function openForm(){
document.getElementById("overlay").style.display="flex";
}

function closeForm(){
document.getElementById("overlay").style.display="none";
}

/* INIT */
renderProducts();
</script>

</body>
</html>
