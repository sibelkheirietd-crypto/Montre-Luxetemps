<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeTemps</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#f5f5f5;}

/* HEADER (نفس ديزاينك) */
header{
    position:fixed;
    top:0;
    width:100%;
    background:#1a1a2e;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.logo{color:gold;font-weight:bold;font-size:20px;}

.nav-links{
    display:flex;
    gap:20px;
    list-style:none;
}

.nav-links a{
    color:white;
    text-decoration:none;
}

/* HERO */
.hero{
    margin-top:80px;
    height:60vh;
    background:#16213e;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.product-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-info{
    padding:15px;
}

button{
    padding:10px;
    width:100%;
    background:#1a1a2e;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:10px;
}

/* FILTERS */
.filters{
    text-align:center;
    margin:20px;
}

.filters button{
    width:auto;
    padding:8px 15px;
    margin:5px;
    border-radius:20px;
}

/* ================= CART ================= */
.cart-icon{
    cursor:pointer;
    position:relative;
}

.cart-count{
    position:absolute;
    top:-8px;
    right:-10px;
    background:red;
    color:white;
    font-size:12px;
    width:18px;
    height:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:350px;
    padding:20px;
    border-radius:10px;
}

.close{
    float:right;
    cursor:pointer;
    font-size:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">LuxeTemps</div>

<ul class="nav-links">
<li><a href="#home">Accueil</a></li>
<li><a href="#products">Produits</a></li>
<li><a href="#" onclick="openForm()">Inscription</a></li>
</ul>

<!-- CART ICON -->
<div class="cart-icon" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>
</header>

<section class="hero">
<h1>Montres LuxeTemps</h1>
<p>La perfection au poignet</p>
</section>

<!-- FILTERS -->
<div class="filters">
<button onclick="renderProducts('all')">Toutes</button>
<button onclick="renderProducts('men')">Homme</button>
<button onclick="renderProducts('women')">Femme</button>
<button onclick="renderProducts('luxury')">Luxe</button>
<button onclick="renderProducts('sport')">Sport</button>
</div>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- CART MODAL -->
<div class="modal" id="cartModal">
<div class="modal-content">
<span class="close" onclick="closeCart()">✖</span>

<h3>Mon Panier</h3>
<div id="cartItems"></div>

<h3>Total: <span id="total">0</span> DZD</h3>
</div>
</div>

<script>
const products=[
{ id:1,name:"Curren Bleu",price:12990,category:"men",type:"luxury",image:"images/montre1.jpg"},
{ id:2,name:"Curren Noir",price:18990,category:"men",type:"luxury",image:"images/montre2.jpg"},
{ id:3,name:"Curren Gris",price:15990,category:"men",type:"luxury",image:"images/montre3.jpg"},
{ id:4,name:"Curren Vert",price:17490,category:"men",type:"luxury",image:"images/montre4.jpg"},
{ id:5,name:"Rolex Rose",price:8990,category:"women",type:"luxury",image:"images/montre5.jpg"},
{ id:6,name:"Smart Watch",price:14290,category:"women",type:"sport",image:"images/montre6.jpg"},
{ id:7,name:"Rolex Classique",price:8900,category:"women",type:"luxury",image:"images/montre7.jpg"},
{ id:8,name:"Rolex Verte",price:12990,category:"women",type:"luxury",image:"images/montre8.jpg"}
];

let cart=[];

// PRODUCTS
function renderProducts(filter="all"){
let container=document.getElementById("products");

let filtered=products.filter(p =>
filter==="all" || p.category===filter || p.type===filter
);

container.innerHTML=filtered.map(p=>`
<div class="product-card">
<img src="${p.image}">
<div class="product-info">
<h3>${p.name}</h3>
<p>${p.price.toLocaleString()} DZD</p>
<button onclick="addToCart(${p.id})">Ajouter au panier</button>
</div>
</div>
`).join("");
}

// CART
function addToCart(id){
let product=products.find(p=>p.id===id);
let item=cart.find(i=>i.id===id);

if(item) item.quantity++;
else cart.push({...product,quantity:1});

updateCart();
}

// UPDATE CART
function updateCart(){
document.getElementById("cartCount").innerText =
cart.reduce((a,b)=>a+b.quantity,0);

renderCart();
}

// RENDER CART
function renderCart(){
let container=document.getElementById("cartItems");

let total=0;

container.innerHTML=cart.map(i=>{
total+=i.price*i.quantity;
return `<p>${i.name} x${i.quantity}</p>`;
}).join("");

document.getElementById("total").innerText=total.toLocaleString();
}

// OPEN / CLOSE CART
function openCart(){
document.getElementById("cartModal").style.display="flex";
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

// INIT
renderProducts();
</script>

</body>
</html>
