<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeTemps - Montres Homme & Femme</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff7fb;
color:#333;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:linear-gradient(135deg,#2b0f1f,#5a1a3a);
padding:12px 0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* LOGO */
.logo-container{
display:flex;
align-items:center;
gap:10px;
}

.logo-container img{
width:40px;
height:40px;
border-radius:50%;
}

.logo{
color:#ffd1e8;
font-size:22px;
font-weight:bold;
}

/* LINKS */
.nav-links{
display:flex;
gap:20px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
}

.nav-links a:hover{
color:#ffd1e8;
}

/* ICONS */
.icons{
display:flex;
gap:15px;
align-items:center;
color:white;
}

.cart-count{
background:#ff4d88;
border-radius:50%;
padding:2px 6px;
font-size:12px;
}

/* HERO */
.hero{
margin-top:80px;
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1523275335684-37898b6baf30') center/cover;
color:white;
}

.hero h1{
font-size:50px;
color:#ffd1e8;
}

.hero p{
margin:15px 0;
}

/* BUTTON */
.btn{
padding:12px 25px;
background:#ff4d88;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

/* PRODUCTS */
.products{
max-width:1200px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:0 20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#ff4d88;
font-weight:bold;
font-size:18px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<nav>

<div class="logo-container">
<img src="https://cdn-icons-png.flaticon.com/512/892/892458.png">
<div class="logo">LuxeTemps</div>
</div>

<ul class="nav-links">
<li><a href="#">Accueil</a></li>
<li><a href="#">Hommes</a></li>
<li><a href="#">Femmes</a></li>
</ul>

<div class="icons">
<i class="fas fa-user" onclick="openModal()"></i>
<i class="fas fa-shopping-cart"></i>
<span class="cart-count">0</span>
</div>

</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>LuxeTemps</h1>
<p>Montres élégantes pour elle & lui</p>
<button class="btn">Découvrir</button>
</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- SIGNUP MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>
<h3>Inscription</h3>

<input type="text" placeholder="Nom">
<input type="email" placeholder="Email">
<input type="password" placeholder="Mot de passe">

<button class="btn" style="width:100%">S'inscrire</button>
</div>
</div>

<script>

const products=[
{
id:1,
name:"Montre Élégance Rose",
price:1299,
img:"https://images.unsplash.com/photo-1524592094714-0f0654e20314"
},
{
id:2,
name:"Classic Gold Women",
price:899,
img:"https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3"
},
{
id:3,
name:"Luxury Black Men",
price:1099,
img:"https://images.unsplash.com/photo-1526045431048-f857369baa09"
},
{
id:4,
name:"Silver Chic",
price:799,
img:"https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1"
}
];

const container=document.getElementById("products");

function display(){
container.innerHTML=products.map(p=>`
<div class="card">
<img src="${p.img}">
<div class="card-body">
<h3>${p.name}</h3>
<p class="price">${p.price} DA</p>
</div>
</div>
`).join("");
}

display();

/* MODAL */
function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target==document.getElementById("modal")){
closeModal();
}
}

</script>

</body>
</html>
